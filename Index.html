<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-BENCH | GPU MELTDOWN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background: #000; color: #ff3333; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; pointer-events: none; }
        .danger-box { border: 2px solid #ff0000; background: rgba(20, 0, 0, 0.8); box-shadow: 0 0 30px #ff0000; }
        #gpu-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .blink-fast { animation: blinker 0.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="p-6 crt h-screen w-screen flex flex-col justify-center items-center">

    <canvas id="gpu-canvas"></canvas>

    <div class="danger-box p-8 rounded-none w-full max-w-4xl z-10 relative backdrop-blur-md">
        <div class="absolute top-0 left-0 bg-red-600 text-white text-xs font-black px-2 py-1 uppercase tracking-widest">
            Level 5 Hazard: GPU Meltdown
        </div>

        <h1 class="text-4xl md:text-5xl font-black text-center mb-2 tracking-tighter mt-4 text-white">GRAPHICS OBLITERATOR</h1>
        <p class="text-center text-red-400 mb-8 text-sm uppercase">Rendering 2.500 High-Poly Glass Objects with Overdraw</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-center mb-8">
            <div class="border border-red-800 p-6 bg-black/50">
                <p class="text-xs text-red-500 uppercase tracking-widest">Calculated Polygons</p>
                <p id="poly-stat" class="text-2xl font-bold text-white mt-2">IDLE</p>
            </div>
            <div class="border border-red-800 p-6 bg-black/50">
                <p class="text-xs text-red-500 uppercase tracking-widest">Visual Throughput (FPS)</p>
                <p id="gpu-stat" class="text-5xl font-black text-red-500 mt-2">0</p>
            </div>
        </div>

        <button onclick="startMeltdown()" id="start-btn" class="w-full bg-red-700 hover:bg-red-600 text-white font-black text-2xl py-6 border-4 border-red-500 transition-all active:scale-95 uppercase tracking-widest shadow-[0_0_20px_#ff0000]">
            DESTROY MY GPU
        </button>
    </div>

    <script>
        function burnGPU() {
            return new Promise((resolve) => {
                document.getElementById('gpu-stat').classList.add('blink-fast');
                document.getElementById('poly-stat').innerText = "~3.2 Million / Frame";

                const canvas = document.getElementById('gpu-canvas');
                // Paksa render di resolusi asli layar (SANGAT BERAT UNTUK HP FHD+)
                const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: false, antialias: true });
                renderer.setPixelRatio(window.devicePixelRatio); 
                renderer.setSize(window.innerWidth, window.innerHeight);

                const scene = new THREE.Scene();
                // Background abu-abu terang agar transparan terlihat jelas
                scene.background = new THREE.Color(0x1a1a1a); 
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
                camera.position.z = 60;

                // Lampu dinamis warna-warni
                const light1 = new THREE.PointLight(0xff0055, 2, 200);
                scene.add(light1);
                const light2 = new THREE.PointLight(0x0055ff, 2, 200);
                scene.add(light2);
                scene.add(new THREE.AmbientLight(0x404040));

                // OBJEK SIKSAAN: Icosahedron dengan Physical Material (Logam Kaca)
                const objects = [];
                // Detail level 4 = bentuk hampir bulat sempurna (ratusan polygon per objek)
                const geo = new THREE.IcosahedronGeometry(3, 4); 
                
                const mat = new THREE.MeshPhysicalMaterial({ 
                    color: 0xffffff, 
                    metalness: 0.9, 
                    roughness: 0.1,
                    clearcoat: 1.0,        // Kalkulasi pantulan ekstra
                    clearcoatRoughness: 0.1,
                    transparent: true,     // OVERDRAW KILLER!
                    opacity: 0.4,          // Memaksa GPU merender pixel berulang kali
                    side: THREE.DoubleSide // Merender luar dan dalam objek
                });

                // Spawn 2.500 objek menumpuk di tengah
                for(let i=0; i<2500; i++) {
                    let mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(
                        (Math.random()-0.5)*80, 
                        (Math.random()-0.5)*80, 
                        (Math.random()-0.5)*40
                    );
                    mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                    scene.add(mesh);
                    objects.push(mesh);
                }

                let frames = 0, lastTime = performance.now(), testStart = performance.now();
                
                function animate() {
                    let now = performance.now();
                    if(now - testStart < 10000) { // Siksa selama 10 detik
                        requestAnimationFrame(animate);
                        
                        // Gerakkan lampu dengan cepat
                        light1.position.x = Math.sin(now * 0.005) * 50;
                        light1.position.y = Math.cos(now * 0.003) * 50;
                        light2.position.x = Math.cos(now * 0.004) * 50;
                        light2.position.y = Math.sin(now * 0.006) * 50;

                        // Rotasi semua 2.500 objek
                        objects.forEach(c => {
                            c.rotation.x += 0.02;
                            c.rotation.y += 0.02;
                        });

                        renderer.render(scene, camera);
                        frames++;

                        // Update FPS Counter
                        if(now - lastTime >= 1000) {
                            document.getElementById('gpu-stat').innerText = frames;
                            frames = 0;
                            lastTime = now;
                        }
                    } else {
                        renderer.dispose();
                        document.getElementById('gpu-stat').classList.remove('blink-fast');
                        resolve();
                    }
                }
                animate();
            });
        }

        async function startMeltdown() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.innerText = "TESTING IN PROGRESS...";
            
            document.getElementById('gpu-stat').innerText = "LOAD";
            
            await burnGPU();

            btn.innerText = "RESTART MELTDOWN";
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    </script>
</body>
</html>
