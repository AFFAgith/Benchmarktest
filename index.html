<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-BENCH | AnTuTu Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid #333; }
        #gpu-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .score-text { background: -webkit-linear-gradient(#facc15, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center p-4">

    <canvas id="gpu-canvas"></canvas>

    <div id="dashboard" class="glass p-8 rounded-3xl w-full max-w-md z-10 transition-all duration-500 shadow-2xl">
        <h1 class="text-4xl font-black text-center mb-1 text-orange-500">X-BENCH <span class="text-white">ULTRA</span></h1>
        <p class="text-center text-gray-400 mb-8 text-xs uppercase tracking-widest">AnTuTu-Style Stress Test</p>

        <div class="grid grid-cols-2 gap-4 text-center mb-8">
            <div class="bg-black/50 p-4 rounded-2xl border border-gray-800">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Live FPS</p>
                <p id="live-fps" class="text-4xl font-bold text-white mt-1">0</p>
            </div>
            <div class="bg-black/50 p-4 rounded-2xl border border-gray-800">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Time Left</p>
                <p id="time-left" class="text-4xl font-bold text-white mt-1">20s</p>
            </div>
        </div>

        <button onclick="startTest()" id="start-btn" class="w-full bg-gradient-to-r from-orange-600 to-yellow-500 hover:from-orange-500 hover:to-yellow-400 text-white font-black text-xl py-5 rounded-2xl transition-all active:scale-95 shadow-[0_0_20px_rgba(249,115,22,0.4)]">
            START BENCHMARK
        </button>
    </div>

    <div id="result-screen" class="glass p-8 rounded-3xl w-full max-w-md z-20 absolute hidden flex-col items-center text-center transform scale-95 opacity-0 transition-all duration-500 shadow-2xl">
        <p class="text-gray-400 uppercase tracking-widest text-xs mb-2">Final Performance Score</p>
        <h2 id="final-score" class="text-6xl font-black mb-2 score-text drop-shadow-lg">0</h2>
        
        <div class="bg-black/60 px-6 py-3 rounded-full border border-gray-800 mb-8 mt-4 w-full">
            <span class="text-gray-400 text-xs uppercase mr-2 tracking-widest">Class:</span>
            <span id="device-rank" class="font-black text-lg text-white tracking-wide">Calculating...</span>
        </div>

        <div class="w-full grid grid-cols-2 gap-4 mb-8 text-sm">
            <div class="bg-black/50 p-4 rounded-2xl border border-gray-800">
                <span class="text-gray-500 text-[10px] uppercase tracking-widest block">Avg FPS</span>
                <span id="res-fps" class="font-bold text-2xl text-white">0</span>
            </div>
            <div class="bg-black/50 p-4 rounded-2xl border border-gray-800">
                <span class="text-gray-500 text-[10px] uppercase tracking-widest block">Total Frames</span>
                <span id="res-frames" class="font-bold text-2xl text-white">0</span>
            </div>
        </div>

        <button onclick="location.reload()" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-bold py-4 rounded-2xl transition uppercase tracking-widest text-sm border border-gray-600">
            TEST AGAIN
        </button>
    </div>

    <script>
        function runBenchmark() {
            return new Promise((resolve) => {
                const canvas = document.getElementById('gpu-canvas');
                const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: false, antialias: false });
                renderer.setPixelRatio(window.devicePixelRatio); 
                renderer.setSize(window.innerWidth, window.innerHeight);

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x050505); 
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
                camera.position.z = 60;

                // Lampu AnTuTu Style (Orange & Biru)
                const light1 = new THREE.PointLight(0xff7300, 3, 200); 
                scene.add(light1);
                const light2 = new THREE.PointLight(0x00aaff, 3, 200); 
                scene.add(light2);
                scene.add(new THREE.AmbientLight(0x111111));

                // Objek Siksaan: 3000 Kaca Bertumpuk!
                const objects = [];
                const geo = new THREE.IcosahedronGeometry(3, 4); 
                const mat = new THREE.MeshPhysicalMaterial({ 
                    color: 0xffffff, metalness: 0.9, roughness: 0.1,
                    clearcoat: 1.0, transparent: true, opacity: 0.3, side: THREE.DoubleSide 
                });

                for(let i=0; i<3000; i++) {
                    let mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set((Math.random()-0.5)*90, (Math.random()-0.5)*90, (Math.random()-0.5)*50);
                    mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                    scene.add(mesh);
                    objects.push(mesh);
                }

                let frames = 0, totalFrames = 0;
                let lastTime = performance.now(), testStart = performance.now();
                const duration = 20000; // DURASI 20 DETIK

                function animate() {
                    let now = performance.now();
                    let elapsed = now - testStart;
                    
                    if(elapsed < duration) { 
                        requestAnimationFrame(animate);
                        
                        light1.position.x = Math.sin(now * 0.005) * 50;
                        light1.position.y = Math.cos(now * 0.003) * 50;
                        light2.position.x = Math.cos(now * 0.004) * 50;
                        light2.position.y = Math.sin(now * 0.006) * 50;

                        objects.forEach(c => { c.rotation.x += 0.03; c.rotation.y += 0.03; });

                        renderer.render(scene, camera);
                        frames++;
                        totalFrames++;

                        // Update UI per detik
                        if(now - lastTime >= 1000) {
                            document.getElementById('live-fps').innerText = frames;
                            document.getElementById('time-left').innerText = Math.ceil((duration - elapsed)/1000) + "s";
                            frames = 0;
                            lastTime = now;
                        }
                    } else {
                        renderer.dispose();
                        let avgFPS = totalFrames / (duration / 1000);
                        resolve({ avgFPS: avgFPS, totalFrames: totalFrames });
                    }
                }
                animate();
            });
        }

        async function startTest() {
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').innerText = "CALCULATING...";
            document.getElementById('start-btn').classList.add('opacity-50');
            
            const result = await runBenchmark();
            
            // Rumus Rahasia Skor ala AnTuTu 
            // Kalau HP flagship mulus 60 FPS, skor tembus ~1.300.000
            let rawScore = (result.avgFPS * 21543) + (result.totalFrames * 15) + Math.floor(Math.random() * 999);
            let finalScore = Math.floor(rawScore);
            
            // Penentuan Pangkat
            let rank = "";
            let rankColor = "";
            if (finalScore < 300000) { rank = "🥔 HP KENTANG"; rankColor = "text-red-500"; }
            else if (finalScore < 600000) { rank = "🥉 ENTRY LEVEL"; rankColor = "text-orange-400"; }
            else if (finalScore < 950000) { rank = "🥈 MID-RANGE"; rankColor = "text-blue-400"; }
            else { rank = "🥇 FLAGSHIP"; rankColor = "text-green-400"; }

            // Transisi UI dari Dashboard ke Layar Hasil
            document.getElementById('dashboard').classList.add('hidden');
            const resScreen = document.getElementById('result-screen');
            resScreen.classList.remove('hidden');
            
            setTimeout(() => {
                resScreen.classList.remove('scale-95', 'opacity-0');
                resScreen.classList.add('scale-100', 'opacity-100');
            }, 50);

            // Animasi Angka Ngetik Cepat ala AnTuTu
            let currentScore = 0;
            let increment = finalScore / 40; 
            let scoreInterval = setInterval(() => {
                currentScore += increment;
                if(currentScore >= finalScore) {
                    currentScore = finalScore;
                    clearInterval(scoreInterval);
                    document.getElementById('device-rank').innerText = rank;
                    document.getElementById('device-rank').className = "font-black text-lg tracking-wide " + rankColor;
                }
                // Format angka pakai titik (misal: 1.250.400)
                document.getElementById('final-score').innerText = Math.floor(currentScore).toLocaleString('id-ID');
            }, 30);

            document.getElementById('res-fps').innerText = result.avgFPS.toFixed(1);
            document.getElementById('res-frames').innerText = result.totalFrames.toLocaleString('id-ID');
        }
    </script>
</body>
</html>
